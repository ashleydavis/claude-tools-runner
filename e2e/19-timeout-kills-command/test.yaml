description: "per-command timeout kills the process and surfaces FAIL timeout on stderr with exit 2"

setup:
  git_init:
    - "."
  files:
    .claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "**/*.ts"
          commands:
            - run: "sleep 5"
              timeout: "1s"
    foo.ts: ""

steps:
  - description: "stderr reports FAIL ... timeout and the hook exits 2"
    expect:
      exit: 2
      stderr_substrings:
        - 'FAIL .claude/claude-tools-runner.yaml:5 "sleep 5" timeout'
        - "summary: 0 pass, 1 fail, 0 skip"
