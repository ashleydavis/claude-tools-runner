description: "negation pattern in paths excludes matched files"

setup:
  git_init:
    - "."
  files:
    .claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "**/*.ts"
            - "!**/excluded/**"
          commands:
            - run: "echo NEG > neg-${{file_name}}.out"
    src/foo.ts: ""
    src/excluded/bar.ts: ""

steps:
  - description: "non-excluded file fires; excluded file does not"
    expect:
      exit: 0
      file_exists:
        - neg-foo.ts.out
      file_not_exists:
        - neg-bar.ts.out
