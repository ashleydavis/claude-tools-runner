description: "per-file template (race-free)"

setup:
  git_init:
    - "."
  files:
    .claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "**/*.md"
          commands:
            - run: "echo ${{file_path}} > per-file-$(basename ${{file_path}}).log"
    a/x.md: ""
    b/y.md: ""

steps:
  - description: "per-file fan-out produces one log per matched file"
    expect:
      exit: 0
      file_exists:
        - per-file-x.md.log
        - per-file-y.md.log
      file_not_exists:
        - per-file.log
      file_line_count:
        - path: per-file-x.md.log
          count: 1
        - path: per-file-y.md.log
          count: 1
      file_contains:
        - path: per-file-x.md.log
          substring: "a/x.md"
        - path: per-file-y.md.log
          substring: "b/y.md"
