description: "no matching files takes the no_match skip path silently"

setup:
  git_init:
    - "."
  files:
    .claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "**/*.foo"
          commands:
            - run: "echo NEVER > never.out"
    bar.txt: ""

steps:
  - description: "audit log records the no_match skipReason; no command runs"
    expect:
      exit: 0
      file_not_exists:
        - never.out
      find_file_contains:
        - search_dir: .claude/claude-tools-runner/log
          pattern: "*.json"
          min_depth: 0
          substrings:
            - '"type":"EXIT"'
            - '"skipReason":"no_match"'
