description: "group_by + ${{group_dir}} per-group fan-out"

setup:
  git_init:
    - "."
  files:
    .claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "packages/*/src/**/*.ts"
          group_by: "packages/*/"
          commands:
            - run: "echo GROUP > group.out"
              cwd: "${{group_dir}}"
    packages/foo/src/util.ts: ""
    packages/foo/src/lib/util.ts: ""
    packages/bar/src/util.ts: ""

steps:
  - description: "exactly two PASS invocations, one per package group"
    expect:
      exit: 0
      stdout_substrings:
        - "summary: 2 pass, 0 fail"
      file_contains:
        - path: packages/foo/group.out
          substring: GROUP
        - path: packages/bar/group.out
          substring: GROUP
