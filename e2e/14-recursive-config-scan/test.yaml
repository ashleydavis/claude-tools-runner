description: "recursive config scan picks up subdirectory YAML"

setup:
  git_init:
    - "."
  files:
    .claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "root-files/*.txt"
          commands:
            - run: "echo ROOT > root.out"
    sub/.claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "sub-files/*.txt"
          commands:
            - run: "echo SUB > sub.out"
    root-files/foo.txt: ""
    sub/sub-files/bar.txt: ""

steps:
  - description: "both root and subdirectory configs fire; both layers' audit logs record their config_load entry"
    expect:
      exit: 0
      file_exists:
        - root.out
        - sub/sub.out
      find_file_contains:
        - search_dir: .claude/claude-tools-runner/log
          pattern: "*.json"
          min_depth: 0
          substrings:
            - '"type":"CONFIG"'
            - '"filePath":".claude/claude-tools-runner.yaml"'
        - search_dir: sub/.claude/claude-tools-runner/log
          pattern: "*.json"
          min_depth: 0
          substrings:
            - '"type":"CONFIG"'
            - '"filePath":"sub/.claude/claude-tools-runner.yaml"'
