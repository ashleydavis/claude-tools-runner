description: "custom cwd via ${{project}}/sub"

setup:
  git_init:
    - "."
  files:
    .claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "**/*.ts"
          commands:
            - run: "echo CWD > out.log"
              cwd: "${{project}}/sub"
    foo.ts: ""
    sub/.gitkeep: ""

steps:
  - description: "out.log lands under sub/, not at project root"
    expect:
      exit: 0
      file_exists:
        - sub/out.log
      file_not_exists:
        - out.log
