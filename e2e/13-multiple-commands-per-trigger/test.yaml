description: "multiple commands per trigger fan out as separate invocations"

setup:
  git_init:
    - "."
  files:
    .claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "**/*.ts"
          commands:
            - run: "echo A > a.out"
            - run: "echo B > b.out"
    foo.ts: ""

steps:
  - description: "both commands run; summary reports 2 pass"
    expect:
      exit: 0
      stdout_substrings:
        - "summary: 2 pass, 0 fail"
      file_contains:
        - path: a.out
          substring: A
        - path: b.out
          substring: B
