description: "failing command surfaces FAIL on stderr and exits 2 so Claude Code wakes the model"

setup:
  git_init:
    - "."
  files:
    .claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "**/*.ts"
          commands:
            - run: "exit 7"
    foo.ts: ""

steps:
  - description: "hook exits 2; stderr reports FAIL exit=7 and 0 pass / 1 fail / 0 skip summary"
    expect:
      exit: 2
      stderr_substrings:
        - 'FAIL .claude/claude-tools-runner.yaml:5 "exit 7" exit=7'
        - "summary: 0 pass, 1 fail, 0 skip"
      find_file_contains:
        - search_dir: .claude/claude-tools-runner/log
          pattern: "*.json"
          min_depth: 0
          substrings:
            - '"type":"EXIT"'
            - '"fail":1'
            - '"exitCode":2'
