description: "brace expansion in paths"

setup:
  git_init:
    - "."
  files:
    .claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "**/*.{ts,tsx}"
          commands:
            - run: "echo BRACE > brace-${{file_name}}.out"
    foo.ts: ""
    bar.tsx: ""
    qux.md: ""

steps:
  - description: ".ts and .tsx match; .md does not"
    expect:
      exit: 0
      file_exists:
        - brace-foo.ts.out
        - brace-bar.tsx.out
      file_not_exists:
        - brace-qux.md.out
