description: "${{file_dir}} per-directory fan-out collapses files by directory"

setup:
  git_init:
    - "."
  files:
    .claude/claude-tools-runner.yaml: |
      triggers:
        - paths:
            - "**/*.log"
          commands:
            - run: "echo DIR > dir.out"
              cwd: "${{file_dir}}"
    dirA/a.log: ""
    dirA/b.log: ""
    dirB/c.log: ""

steps:
  - description: "exactly two invocations (one per directory) and one dir.out per directory"
    expect:
      exit: 0
      stdout_substrings:
        - "summary: 2 pass, 0 fail"
      file_exists:
        - dirA/dir.out
        - dirB/dir.out
